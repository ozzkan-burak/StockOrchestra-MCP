version: '3.8'
services:
  stock-db:
    image: postgres:16
    container_name: stockorchestra-db
    environment:
      - POSTGRES_DB=StockDb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
