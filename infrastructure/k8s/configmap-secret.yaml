# ==============================================================================
# StockOrchestra - ConfigMaps and Secrets
# ==============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stockorchestra-config
  namespace: stockorchestra
data:
  # Database connection string
  postgres-connection: "Host=timescaledb;Database=stockorchestra_ledger;Username=stockorchestra;Password=stockorchestra"

  # Redis connection string
  redis-connection: "localhost:6379,abortConnect=false"

  # Allowed CORS origins (comma-separated)
  allowed-origins: "http://localhost:3000,http://localhost:8080"

  # Service URLs
  portfolio-manager-url: "http://portfolio-manager:80"
  price-discovery-url: "http://price-discovery:80"
  analytical-store-url: "http://analytical-store:80"

  # Environment
  environment: "production"

---
apiVersion: v1
kind: Secret
metadata:
  name: stockorchestra-secrets
  namespace: stockorchestra
type: Opaque
stringData:
  # JWT Secret Key (minimum 32 characters)
  jwt-secret-key: "CHANGE_ME_IN_PRODUCTION_USE_STRONG_RANDOM_KEY"

  # PostgreSQL password
  postgres-password: "CHANGE_ME_IN_PRODUCTION_STRONG_PASSWORD"

  # Redis password
  redis-password: "CHANGE_ME_IN_PRODUCTION_STRONG_PASSWORD"

  # Grafana password
  grafana-password: "CHANGE_ME_IN_PRODUCTION_STRONG_PASSWORD"