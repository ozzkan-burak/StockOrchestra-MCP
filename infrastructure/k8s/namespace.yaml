# ==============================================================================
# StockOrchestra - Kubernetes Namespace
# ==============================================================================
---
apiVersion: v1
kind: Namespace
metadata:
  name: stockorchestra
  labels:
    name: stockorchestra
    environment: production

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: stockorchestra-quota
  namespace: stockorchestra
spec:
  hard:
    pods: "50"
    services: "20"
    secrets: "10"
    configmaps: "10"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: stockorchestra-limits
  namespace: stockorchestra
spec:
  limits:
  - max:
      cpu: "2"
      memory: "2Gi"
    min:
      cpu: "50m"
      memory: "64Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    type: Container