# ==============================================================================
# StockOrchestra - Portfolio Manager Kubernetes Manifests
# ==============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-manager
  namespace: stockorchestra
  labels:
    app: portfolio-manager
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-manager
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: portfolio-manager
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: portfolio-manager
        image: stockorchestra/portfolio-manager:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: DATABASE__CONNECTIONSTRING
          valueFrom:
            configMapKeyRef:
              name: stockorchestra-config
              key: postgres-connection
        - name: REDIS__CONNECTIONSTRING
          valueFrom:
            configMapKeyRef:
              name: stockorchestra-config
              key: redis-connection
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: stockorchestra-secrets
              key: jwt-secret-key
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-manager
  namespace: stockorchestra
  labels:
    app: portfolio-manager
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: portfolio-manager

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: portfolio-manager-hpa
  namespace: stockorchestra
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: portfolio-manager
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70