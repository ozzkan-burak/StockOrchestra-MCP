# ==============================================================================
# StockOrchestra - API Gateway Kubernetes Manifests
# ==============================================================================
# Proje: StockOrchestra-MCP
# Faz: 8 - Cloud Native & Kubernetes
# Açıklama: API Gateway için K8s Deployment, Service, Ingress ve HPA
# ==============================================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: stockorchestra
  labels:
    app: api-gateway
    tier: gateway
spec:
  # Replica count - High availability için en az 2
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  # Rolling update strategy - zero downtime deployment
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
        tier: gateway
    spec:
      # Security: Run as non-root user
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: api-gateway
        image: stockorchestra/api-gateway:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        # Resource limits - prevent runaway resource usage
        resources:
          requests:
            cpu: 100m        # 0.1 CPU core
            memory: 128Mi   # 128 MB
          limits:
            cpu: 500m       # 0.5 CPU core
            memory: 512Mi   # 512 MB
        # Environment variables from ConfigMap and Secrets
        env:
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: stockorchestra-secrets
              key: jwt-secret-key
        - name: ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: stockorchestra-config
              key: allowed-origins
        # Liveness probe - is container alive?
        # Kubernetes pod'u restart eder eğer fails
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        # Readiness probe - can container serve traffic?
        # Kubernetes trafiği yönlendirmez eğer fails
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      # Pod scheduling preferences
      affinity:
        podAntiAffinity:
          preferredDuringScheduling权重:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: api-gateway
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: stockorchestra
  labels:
    app: api-gateway
spec:
  type: ClusterIP  # Internal cluster IP
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  selector:
    app: api-gateway

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: stockorchestra
  annotations:
    # Rate limiting via ingress controller
    nginx.ingress.kubernetes.io/limit-rps: "60"
    nginx.ingress.kubernetes.io/limit-connections: "100"
spec:
  ingressClassName: nginx
  rules:
  - host: api.stockorchestra.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api-gateway
            port:
              number: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: stockorchestra
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # Scale up when CPU > 70%