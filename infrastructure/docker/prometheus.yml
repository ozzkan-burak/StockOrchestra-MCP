global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'stockorchestra'
    environment: 'development'

scrape_configs:
  - job_name: 'portfolio-manager'
    static_configs:
      - targets: ['portfolio-manager:5001']
        labels:
          service: 'portfolio-manager'

  - job_name: 'price-discovery'
    static_configs:
      - targets: ['price-discovery:5003']
        labels:
          service: 'price-discovery'

  - job_name: 'analytical-store'
    static_configs:
      - targets: ['analytical-store:5002']
        labels:
          service: 'analytical-store'

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:5000']
        labels:
          service: 'api-gateway'