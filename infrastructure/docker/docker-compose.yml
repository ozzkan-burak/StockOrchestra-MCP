# ==============================================================================
# StockOrchestra - Complete Infrastructure Docker Compose
# ==============================================================================
# Proje: StockOrchestra-MCP
# Faz: 1-7 - Tüm Altyapı Servisleri
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # TimescaleDB Servisi (PostgreSQL 15 tabanlı, Time-Series veritabanı)
  # ----------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: stockorchestra_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: stockorchestra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockorchestra_secure_pass_2024}
      POSTGRES_DB: stockorchestra_ledger
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --locale=C
    ports:
      - '5432:5432'
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - internal_bridge
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stockorchestra -d stockorchestra_ledger']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      service.type: timeseries-database
      project.name: StockOrchestra
      project.version: '1.0'

  # ----------------------------------------------------------------------------
  # Redis Servisi (In-Memory Data Store, Message Broker)
  # ----------------------------------------------------------------------------
  redis:
    image: redis:alpine
    container_name: stockorchestra_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secure_pass_2024}
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --timeout 300
      --loglevel notice
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - internal_bridge
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'healthcheck.ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      service.type: in-memory-cache
      project.name: StockOrchestra
      project.version: '1.0'

  # ----------------------------------------------------------------------------
  # Jaeger (Distributed Tracing - OpenTelemetry)
  # ----------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: stockorchestra_jaeger
    restart: unless-stopped
    ports:
      - '16686:16686'   # UI
      - '6831:6831'   # UDP Agent
      - '6832:6832'   # ZIPKIN
    environment:
      COLLECTOR_OTLP_ENABLED: true
      SPAN_STORAGE_TYPE: badger
    networks:
      - internal_bridge
    labels:
      service.type: tracing
      project.name: StockOrchestra
      project.version: '1.0'

  # ----------------------------------------------------------------------------
  # Prometheus (Metrics Collection)
  # ----------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: stockorchestra_prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - internal_bridge
    labels:
      service.type: metrics
      project.name: StockOrchestra
      project.version: '1.0'

  # ----------------------------------------------------------------------------
  # Grafana (Metrics Visualization)
  # ----------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: stockorchestra_grafana
    restart: unless-stopped
    ports:
      - '3030:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - internal_bridge
    labels:
      service.type: visualization
      project.name: StockOrchestra
      project.version: '1.0'

volumes:
  timescale_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  internal_bridge:
    driver: bridge
    labels:
      project.name: StockOrchestra
      network.type: internal
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1