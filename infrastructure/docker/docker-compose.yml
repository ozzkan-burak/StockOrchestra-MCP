# ==============================================================================
# StockOrchestra - Altyapı Docker Compose Yapılandırması
# ==============================================================================
# Proje: StockOrchestra-MCP
# Faz: 1 - Şantiye ve Altyapı (Infrastructure as Code)
# Açıklama: TimescaleDB, Redis ve Message Broker servislerinin yapılandırması
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # TimescaleDB Servisi (PostgreSQL 15 tabanlı, Time-Series veritabanı)
  # ----------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: stockorchestra_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: stockorchestra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stockorchestra_secure_pass_2024}
      POSTGRES_DB: stockorchestra_ledger
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --locale=C
    ports:
      - '5432:5432'
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - internal_bridge
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U stockorchestra -d stockorchestra_ledger']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      service.type: timeseries-database
      project.name: StockOrchestra
      project.version: '1.0'
      project.phase: '1'

  # ----------------------------------------------------------------------------
  # Redis Servisi (In-Memory Data Store, Message Broker)
  # ----------------------------------------------------------------------------
  redis:
    image: redis:alpine
    container_name: stockorchestra_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secure_pass_2024}
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --timeout 300
      --loglevel notice
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - internal_bridge
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'healthcheck.ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      service.type: in-memory-cache
      project.name: StockOrchestra
      project.version: '1.0'
      project.phase: '1'

# ----------------------------------------------------------------------------
# Docker Volumes - Veri Kalıcılığı için Named Volumes
# ----------------------------------------------------------------------------
volumes:
  timescale_data:
    driver: local
    labels:
      project.name: StockOrchestra
      project.version: '1.0'
      volume.type: database

  redis_data:
    driver: local
    labels:
      project.name: StockOrchestra
      project.version: '1.0'
      volume.type: cache

# ----------------------------------------------------------------------------
# Docker Networks - İç Ağ Yapılandırması
# ----------------------------------------------------------------------------
networks:
  internal_bridge:
    driver: bridge
    labels:
      project.name: StockOrchestra
      network.type: internal
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

# ==============================================================================
# Kullanım Notları:
# ==============================================================================
# 1. Başlatma: docker-compose up -d
# 2. Durumu kontrol et: docker-compose ps
# 3. Logları izle: docker-compose logs -f timescaledb
# 4. Logları izle: docker-compose logs -f redis
# 5. Durdurma: docker-compose down
# 6. Volume'leri silmeden durdurma: docker-compose down -v
# ==============================================================================
# Ortam Değişkenleri:
# ==============================================================================
# POSTGRES_PASSWORD: PostgreSQL şifresi (varsayılan: stockorchestra_secure_pass_2024)
# REDIS_PASSWORD: Redis şifresi (varsayılan: redis_secure_pass_2024)
# ÖNERİ: .env dosyası kullanarak bu değerleri güvenli şekilde yönetin
# ==============================================================================
